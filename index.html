<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Завод Нева — КП</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#222536;--bg4:#2a2e42;
  --accent:#5b7fff;--accent2:#7c9fff;--accentDim:rgba(91,127,255,.15);
  --text:#e8eaf2;--text2:#9ba3bf;--text3:#5a6282;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --success:#3dd68c;--warning:#f5a623;--danger:#ff5e7a;--purple:#b47fff;
  --r:12px;--r2:8px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Onest',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
#scroll-root{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
.app{max-width:440px;margin:0 auto;padding:16px 12px 90px}
/* HEADER */
.header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.logo{width:38px;height:38px;background:var(--accentDim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.header-sub{font-size:11px;color:var(--text3)}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
/* FORMS */
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:9px 11px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:.15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--bg4)}
input::placeholder{color:var(--text3)}
select option{background:var(--bg3)}
.field{margin-bottom:12px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.field-row3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-bottom:12px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--r2);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:.15s;width:100%}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-danger{background:rgba(255,94,122,.12);color:var(--danger);border:1px solid rgba(255,94,122,.25)}
.btn-success{background:rgba(61,214,140,.12);color:var(--success);border:1px solid rgba(61,214,140,.25)}
.btn-ghost{background:none;border:1.5px dashed var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 10px;font-size:12px;width:auto}
.btn[disabled]{opacity:.4;pointer-events:none}
.btn-row{display:flex;gap:8px;margin-top:14px}
.btn-row .btn{flex:1}
/* TYPE GRID */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.type-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.type-card{background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--r);padding:12px 8px;cursor:pointer;text-align:center;transition:.2s;user-select:none}
.type-card.selected{border-color:var(--accent);background:var(--accentDim)}
.type-card:active{transform:scale(.97)}
.type-card-icon{font-size:20px;margin-bottom:4px}
.type-card-name{font-size:12px;font-weight:600}
.type-card-sub{font-size:10px;color:var(--text3);margin-top:1px}
/* NAV */
.nav{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.nav-back{background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit;display:flex;align-items:center;gap:4px;padding:0}
.nav-back:active{color:var(--accent)}
.nav-title{font-size:15px;font-weight:700;flex:1}
/* SECTION */
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;margin-top:2px}
/* LAYER ITEM */
.layer-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:11px 12px;margin-bottom:8px}
.layer-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.layer-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;flex-shrink:0}
.badge-primer{background:rgba(245,166,35,.15);color:var(--warning)}
.badge-enamel{background:rgba(91,127,255,.15);color:var(--accent2)}
.badge-lacquer{background:rgba(180,127,255,.15);color:var(--purple)}
.badge-thinner{background:rgba(61,214,140,.15);color:var(--success)}
.badge-custom{background:rgba(255,255,255,.08);color:var(--text2)}
.badge-pe{background:rgba(255,140,105,.15);color:#ff8c69}
.badge-we{background:rgba(64,192,208,.15);color:#40c0d0}
.layer-name{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{width:28px;height:28px;border-radius:6px;border:none;background:var(--bg4);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.15s}
.icon-btn:hover{background:var(--danger);color:#fff}
.icon-btn.up-btn:hover{background:var(--accent);color:#fff}
.layer-stats{display:flex;gap:6px;flex-wrap:wrap}
.layer-stat{font-size:11px;color:var(--text3);background:var(--bg4);padding:2px 7px;border-radius:8px}
.layer-price{font-size:13px;font-weight:700;color:var(--success);margin-top:6px}
.layer-item-open{border-color:var(--accent);background:var(--bg4)}
.layer-edit-divider{height:1px;background:var(--border2);margin:10px 0}
.layer-edit-form{margin-top:4px}
.edit-btn{font-size:12px!important}
.edit-btn.active-edit{background:var(--accentDim)!important;color:var(--accent2)!important}
.icon-btn:hover{background:var(--danger);color:#fff}
.icon-btn.up-btn:hover{background:var(--accent);color:#fff}
.icon-btn.edit-btn:hover{background:var(--accentDim)!important;color:var(--accent2)!important}
/* RESULT TABLE */
.result-table{background:var(--bg3);border-radius:var(--r2);overflow:hidden;margin-bottom:12px}
.rt-row{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);gap:8px}
.rt-row:last-child{border-bottom:none}
.rt-badge{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rt-name{flex:1;font-size:13px;min-width:0}
.rt-sub{font-size:11px;color:var(--text3)}
.rt-val{font-size:13px;font-weight:600;flex-shrink:0}
.rt-total{background:var(--accentDim);border-top:1px solid rgba(91,127,255,.3)!important}
.rt-total .rt-name{font-weight:700;color:var(--accent2)}
.rt-total .rt-val{color:var(--accent2)}
/* METRIC GRID */
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric{background:var(--bg3);border-radius:var(--r2);padding:12px;text-align:center}
.metric-val{font-size:20px;font-weight:700;color:var(--accent2)}
.metric-label{font-size:11px;color:var(--text3);margin-top:2px}
/* PRICE BIG */
.price-hero{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border2);border-radius:var(--r);padding:20px;text-align:center;margin-bottom:12px}
.price-hero-val{font-size:32px;font-weight:700;color:var(--success)}
.price-hero-sub{font-size:12px;color:var(--text3);margin-top:4px}
/* MAT CARD */
.mat-card{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:11px;cursor:pointer;transition:.2s;margin-bottom:7px;display:flex;align-items:center;gap:9px;user-select:none}
.mat-card.selected{border-color:var(--accent);background:var(--accentDim)}
.mat-card:active{transform:scale(.98)}
.mat-badge{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.mat-info{flex:1;min-width:0}
.mat-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mat-sub{font-size:11px;color:var(--text3);margin-top:1px}
.mat-price-tag{font-size:12px;font-weight:600;color:var(--accent2);flex-shrink:0;text-align:right}
/* ALERTS */
.alert{border-radius:var(--r2);padding:9px 11px;font-size:12px;margin-bottom:10px;display:flex;gap:7px;align-items:flex-start}
.alert-info{background:rgba(91,127,255,.1);border:1px solid rgba(91,127,255,.25);color:var(--accent2)}
.alert-warn{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.25);color:var(--warning)}
/* TAGS */
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.tag-1c{background:rgba(91,127,255,.15);color:var(--accent2)}
.tag-2c{background:rgba(61,214,140,.15);color:var(--success)}
/* SNACK */
.snack{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:22px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;max-width:90vw}
.snack.show{opacity:1}
/* EMPTY */
.empty{text-align:center;padding:36px 16px;color:var(--text3)}
.empty-icon{font-size:34px;margin-bottom:8px}
/* DIVIDER */
.divider{height:1px;background:var(--border);margin:12px 0}
/* SCHEME TAG */
.scheme-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:600;background:var(--bg4);color:var(--text2)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
/* HOME MENU */
.menu-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;cursor:pointer;display:flex;align-items:center;gap:11px;margin-bottom:8px;transition:.15s;user-select:none}
.menu-item:active{transform:scale(.98)}
.menu-icon{font-size:22px;flex-shrink:0}
.menu-text{flex:1}
.menu-title{font-size:14px;font-weight:600}
.menu-sub{font-size:12px;color:var(--text3);margin-top:1px}
.menu-arrow{color:var(--text3);font-size:18px}
</style>
</head>

<div id="scroll-root"><div class="app"><div id="root"></div></div></div>
<div class="snack" id="snack"></div>
<script>
/* ===== CONFIG ===== */
// ← ЗАМЕНИТЕ НА ВАШ БЕЛЫЙ IP, например: 'http://123.45.67.89:8000'
const API_URL = 'https://nonconversationally-vestibular-pia.ngrok-free.dev';

/* ===== TELEGRAM ===== */
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

/* ===== AUTH STATE ===== */
// Простая авторизация: Telegram initData или PIN
// Генерируем стабильный device ID при первом запуске
function getDeviceId(){
  let id = localStorage.getItem('zn_device_id');
  if(!id){
    id = 'dev_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    localStorage.setItem('zn_device_id', id);
  }
  return id;
}
const DEVICE_ID = getDeviceId();

const auth = {
  pin:    localStorage.getItem('zn_pin') || null,
  userId: localStorage.getItem('zn_uid') || DEVICE_ID,
  name:   localStorage.getItem('zn_name') || null,
};
function saveAuth(uid, name, pin){
  auth.pin=pin; auth.userId=uid; auth.name=name;
  if(pin) localStorage.setItem('zn_pin', pin);
  localStorage.setItem('zn_uid', uid);
  localStorage.setItem('zn_name', name||'');
}
function clearAuth(){
  auth.pin=null; auth.userId=null; auth.name=null;
  ['zn_pin','zn_uid','zn_name'].forEach(k=>localStorage.removeItem(k));
}

/* ===== API HELPERS ===== */
async function api(method, path, body){
  const headers = {
    'Content-Type':'application/json',
    'ngrok-skip-browser-warning': '1',
  };
  if(tg?.initData && tg.initData.length > 10) headers['X-TG-InitData'] = tg.initData;
  if(auth.pin && auth.pin !== 'null') headers['X-Pin'] = auth.pin;
  const opts = {method, headers};
  if(body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(API_URL + path, opts);
    if(r.status === 401){ clearAuth(); render(); throw new Error('auth'); }
    if(!r.ok) throw new Error('server error '+r.status);
    const text = await r.text();
    try { return JSON.parse(text); }
    catch(je){ console.warn('JSON parse error:', text.slice(0,100)); return null; }
  } catch(e) {
    if(e.message === 'auth') throw e;
    console.warn('API error:', e.message);
    return null;
  }
}

/* ===== SYNC ===== */
let syncPending = false;
async function syncWithServer(doRender){
  // Один запрос: отправляем свои данные, получаем общие
  const data = await api('POST', '/sync', {
    catalog:  catalogDirty ? state.catalog : [],
    schemes:  schemeDirty  ? state.schemes  : [],
    proposals: state.proposals,
    pin:      auth.pin || undefined,
    username: DEVICE_ID,
  });
  if(!data) return; // offline — работаем с localStorage
  // Общие данные (каталог, схемы) — берём с сервера если там есть
  if(data.catalog?.length)   { state.catalog   = data.catalog; catalogDirty = false; }
  if(data.schemes?.length)   { state.schemes   = data.schemes; schemeDirty  = false; }
  if(data.proposals?.length) state.proposals = data.proposals;
  if(data.user_id) { auth.userId = data.user_id; localStorage.setItem('zn_uid', data.user_id); }
  persist();
  // render() только если явно запрошен
  if(doRender) render();
}
// Оставляем для совместимости
async function syncPull(){ return syncWithServer(true); }
async function syncPush(){ return syncWithServer(false); }
// Автосинк при изменениях
const _origPersist = null;
function persistAndSync(){
  persist();
  syncWithServer(false).catch(()=>{}); // синхронизируем без перерисовки
}

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function currentZone(){return state.kp.zones[state.currentZoneIdx]||null}
function newZone(name,area){return {id:genId(),name:name,area:area,layers:[]}}

function exportData(){
  const data = {
    catalog: state.catalog,
    schemes: state.schemes,
    proposals: state.proposals,
    exportedAt: new Date().toLocaleDateString('ru'),
    version: 'zavod-neva-v1'
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const reader = new FileReader();
  reader.onloadend = function(){
    const a = document.createElement('a');
    a.href = reader.result;
    a.download = 'zavod-neva-backup-'+Date.now().toString(36)+'.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    show('📤 Данные экспортированы! Перенесите файл на другое устройство и импортируйте');
  };
  reader.readAsDataURL(blob);
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const data = JSON.parse(e.target.result);
      if(data.version !== 'zavod-neva-v1'){
        show('❌ Неверный формат файла');
        return;
      }
      if(data.catalog?.length) state.catalog = data.catalog;
      if(data.schemes?.length) state.schemes = data.schemes;
      if(data.proposals?.length){
        // Мёрджим — добавляем только новые КП (по id)
        const existingIds = new Set(state.proposals.map(p=>p.id));
        const newProposals = data.proposals.filter(p=>!existingIds.has(p.id));
        state.proposals = [...state.proposals, ...newProposals];
      }
      persist();
      render();
      show('✅ Импортировано: '+
        (data.proposals?.length||0)+' КП, '+
        (data.catalog?.length||0)+' материалов');
    } catch(err){
      show('❌ Ошибка чтения файла: '+err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

/* ===== РАСЧЁТ ОДНОГО СЛОЯ ===== */
function calcLayer(kpLayer, area){
  const a = parseFloat(area)||0;
  const prod = kpLayer.productId ? getProduct(kpLayer.productId) : null;

  const price  = kpLayer.customPrice        != null ? kpLayer.customPrice        : (prod?.price||0);
  const cons   = kpLayer.customConsumption  != null ? kpLayer.customConsumption  : (prod?.consumption||0);
  const comp   = kpLayer.customComp  || prod?.comp  || '1c';
  const unit   = kpLayer.customUnit  || prod?.unit  || 'kg'; // 'kg' | 'l'
  const layerCount = parseFloat(kpLayer.layers) || 1;
  const name     = kpLayer.customName || prod?.name || 'Позиция';
  const fullName = kpLayer.customFullName || prod?.fullName || name;
  const category = kpLayer.category  || prod?.category || 'custom';

  // Единицы: kg → расход г/м², тара кг, цена ₽/кг
  //           l  → расход мл/м², тара л,  цена ₽/л
  const unitLabel = unit === 'l' ? 'л'    : 'кг';
  const consLabel = unit === 'l' ? 'мл/м²': 'г/м²';
  const priceLabel= unit === 'l' ? '₽/л'  : '₽/кг';

  // Теоретический расход в единицах тары (кг или л)
  // Для разбавителей (consumption=0): количество = layerCount × размер тары
  let baseConsUnit;
  if(category === 'thinner' && cons === 0){
    // Разбавитель добавлен как отдельная позиция — layerCount = кол-во упаковок
    const tarSize = kpLayer.customContainer != null
      ? kpLayer.customContainer
      : (parseFloat(prod?.container) || (unit==='l' ? 10 : 25));
    baseConsUnit = layerCount * tarSize;
  } else {
    baseConsUnit = a * (cons / 1000) * layerCount;
  }

  // Разбавитель — отдельная позиция в КП, не считается автоматически
  const thinnerAmt  = 0;
  const thinnerCost = 0;
  const thinnerProd = null;

  let containers, kits, actualAmt, costMat;

  if(comp === '2c' && (prod?.base || kpLayer.customContainer)){
    // 2К: расчёт кратно комплекту по ОСНОВЕ
    const base     = kpLayer.customContainer != null ? kpLayer.customContainer : (parseFloat(prod?.base)||18);
    const hardener = kpLayer.customHardener  != null ? kpLayer.customHardener  : (parseFloat(prod?.hardener)||3);
    kits       = Math.ceil(baseConsUnit / base);
    actualAmt  = kits * (base + hardener);   // в единицах тары
    costMat    = actualAmt * price;           // ₽
    containers = null;
  } else {
    // 1К: расчёт кратно таре
    const cw   = kpLayer.customContainer != null ? kpLayer.customContainer : (parseFloat(prod?.container)||25);
    containers = Math.ceil(baseConsUnit / cw);
    actualAmt  = containers * cw;             // в единицах тары
    costMat    = actualAmt * price;           // ₽
    kits       = null;
  }

  return {
    name, fullName, category, comp, unit, unitLabel, consLabel, priceLabel,
    price, cons, layerCount,
    baseConsUnit: +baseConsUnit.toFixed(3),   // теор. расход (кг или л)
    actualAmt:    +actualAmt.toFixed(3),      // факт. расход кратно таре (кг или л)
    thinnerAmt:   0,
    thinnerName:  '',
    thinnerCost:  Math.round(thinnerCost),
    containers, kits,
    costMat: Math.round(costMat),
    prod, kpLayer
  };
}

function calcZone(zone, includeThinners){
  const area=parseFloat(zone.area)||0;
  const incTh = true; // разбавитель всегда включён — управляется как отдельный материал
  const layers=(zone.layers||[]).map(l=>calcLayer(l,area));
  const matCost=layers.reduce((s,l)=>s+l.costMat,0);
  const thinnerCostTotal=layers.reduce((s,l)=>s+l.thinnerCost,0);
  const total=Math.round(matCost+(incTh?thinnerCostTotal:0));
  const pricePerM2=area>0?total/area:0;
  const matKg=layers.filter(l=>l.unit==='kg').reduce((s,l)=>s+l.actualAmt,0);
  const matL=layers.filter(l=>l.unit==='l').reduce((s,l)=>s+l.actualAmt,0);
  const thinnerAmt=layers.reduce((s,l)=>s+l.thinnerAmt,0);
  return {zone,area,layers,matCost:Math.round(matCost),thinnerCostTotal:Math.round(thinnerCostTotal),
    total,pricePerM2:+pricePerM2.toFixed(2),matKg:+matKg.toFixed(2),matL:+matL.toFixed(2),thinnerAmt:+thinnerAmt.toFixed(3)};
}
function calcKP(){
  const kp=state.kp;
  const incTh=true;
  const zones=(kp.zones||[]).map(z=>calcZone(z,incTh));
  const total=zones.reduce((s,z)=>s+z.total,0);
  const totalArea=zones.reduce((s,z)=>s+z.area,0);
  const pricePerM2=totalArea>0?total/totalArea:0;
  return {zones,total:Math.round(total),totalArea,pricePerM2:+pricePerM2.toFixed(2)};
}

function renderKPResult(){
  const kp = state.kp;
  const incTh = true;
  const vm = kp.viewMode || 'total'; // 'total' | 'zones'
  const r = calcKP();

  function zoneTable(zr){
    let rows = '';
    (zr.layers||[]).forEach(l=>{
      const cat = l.kpLayer?.category||l.prod?.category||'custom';
      const qty = l.comp==='2c'
        ? l.kits+' компл. = '+fmtN(l.actualAmt,2)+' '+l.unitLabel
        : l.containers+' шт. = '+fmtN(l.actualAmt,2)+' '+l.unitLabel;
      const lineCost = l.costMat + (incTh ? l.thinnerCost : 0);
      const ppu = l.actualAmt>0 ? fmtRub(Math.round(lineCost/l.actualAmt))+' '+l.priceLabel : '';
      const thinnerRow = (incTh && l.thinnerAmt>0)
        ? '<div class="rt-sub">+ разб.: '+fmtN(l.thinnerAmt,3)+' '+l.unitLabel+' '+esc(l.thinnerName)+'</div>' : '';
      rows += '<div class="rt-row">'
        +'<div class="rt-badge" style="background:'+catColor(cat)+'"></div>'
        +'<div class="rt-name">'
          +'<div>'+esc(l.fullName||l.name)+'</div>'
          +'<div class="rt-sub"><strong>'+qty+'</strong></div>'
          +thinnerRow
          +'<div class="rt-sub" style="color:var(--accent2)">'+ppu+'</div>'
        +'</div>'
        +'<div class="rt-val">'+fmtRub(lineCost)+'</div>'
        +'</div>';
    });
    const zoneThinnerNote = (!incTh && zr.thinnerCostTotal>0)
      ? '<div class="rt-row" style="opacity:.5"><div class="rt-badge"></div>'
        +'<div class="rt-name" style="color:var(--text3)">Разбавители (исключены)</div>'
        +'<div class="rt-val" style="color:var(--text3);text-decoration:line-through">'+fmtRub(zr.thinnerCostTotal)+'</div>'
        +'</div>' : '';
    rows += zoneThinnerNote;
    rows += '<div class="rt-row rt-total">'
      +'<div class="rt-badge" style="background:var(--accent)"></div>'
      +'<div class="rt-name">Итого зона'
        +'<div class="rt-sub" style="color:var(--accent2)">'+fmtRub(Math.round(zr.pricePerM2*(incTh?1:zr.matCost/Math.max(zr.total,1))))+' ₽/м²</div>'
      +'</div>'
      +'<div class="rt-val">'+fmtRub(zr.total)+'</div>'
      +'</div>';
    return '<div class="result-table" style="margin-bottom:12px">'+rows+'</div>';
  }

  // Пересчитываем total с учётом разбавителей
  const displayTotal = r.zones.reduce((s,zr)=>s+zr.total,0);
  const displayPerM2 = r.totalArea>0 ? displayTotal/r.totalArea : 0;

  return `
  <div class="nav"><button class="nav-back" id="back-kp-zones">← Зоны</button>
    <div class="nav-title">Итоговое КП</div></div>

  <div style="font-size:13px;font-weight:600;margin-bottom:2px">${esc(kp.name||'Без названия')}</div>
  <div style="font-size:12px;color:var(--text3);margin-bottom:12px">${r.zones.length} зон · ${r.totalArea} м²</div>

  <!-- Переключатель вид -->
  <div style="display:flex;background:var(--bg3);border-radius:20px;padding:3px;gap:2px;margin-bottom:14px">
    <button onclick="state.kp.viewMode='total';render()"
      style="flex:1;padding:6px 10px;border-radius:16px;border:none;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;background:${vm==='total'?'var(--accent)':'none'};color:${vm==='total'?'#fff':'var(--text3)'}">
      Итого</button>
    <button onclick="state.kp.viewMode='zones';render()"
      style="flex:1;padding:6px 10px;border-radius:16px;border:none;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;background:${vm==='zones'?'var(--accent)':'none'};color:${vm==='zones'?'#fff':'var(--text3)'}">
      По зонам</button>
  </div>

  <div class="price-hero">
    <div style="font-size:12px;color:var(--text3);margin-bottom:4px">ИТОГО · ${r.totalArea} м²</div>
    <div class="price-hero-val">${fmtRub(displayTotal)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
      <div style="background:var(--bg4);border-radius:8px;padding:8px;text-align:center">
        <div style="font-size:15px;font-weight:700;color:var(--accent2)">${r.totalArea>0?fmtRub(Math.round(displayPerM2)):'-'}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">₽ / м²</div>
      </div>
      <div style="background:var(--bg4);border-radius:8px;padding:8px;text-align:center">
        <div style="font-size:13px;font-weight:600;color:var(--text2)">${r.zones.length} зон</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${r.zones.length} зон</div>
      </div>
    </div>
  </div>

  ${vm==='zones' ? r.zones.map((zr,zi)=>{
    const zName = esc(zr.zone.name||('Зона '+(zi+1)));
    const zTotal = zr.total;
    return '<div style="margin-bottom:14px">'
      +'<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">'
        +'<div style="font-weight:700;font-size:14px">'+zName+'</div>'
        +'<div style="font-size:12px;color:var(--text3)">'+zr.area+' м² · '+fmtRub(zTotal)+' ₽</div>'
      +'</div>'
      +zoneTable(zr)
      +'</div>';
  }).join('') : ''}

  ${vm==='total' ? (() => {
    let allRows = '';
    r.zones.forEach((zr,zi)=>{
      if(r.zones.length>1) allRows += '<div class="brow" style="background:var(--bg4);font-weight:600;padding:8px 12px;font-size:12px;color:var(--text2)">'+(zr.zone.name||'Зона '+(zi+1))+' — '+zr.area+' м²</div>';
      allRows += zoneTable(zr).replace('<div class="result-table"','<div class="result-table" style="border-radius:0;margin-bottom:0"').replace('rt-total','').replace('<div class="rt-row rt-total">','');
    });
    return '<div class="breakdown">'+allRows+'</div>';
  })() : ''}

  ${kp.note ? '<div class="alert alert-warn" style="margin-top:8px">📝 '+esc(kp.note)+'</div>' : ''}
  <div class="btn-row" style="margin-top:14px">
    <button class="btn btn-secondary" id="save-kp">💾 Сохранить КП</button>
    <button class="btn btn-success" id="export-kp">📄 PDF</button>
  </div>
  ${tg?.initData ? `<button class="btn btn-secondary" id="send-pdf-tg" style="margin-top:8px">✈️ Отправить PDF в Telegram</button>` : ''}
  <div style="margin-top:8px"><button class="btn btn-secondary" id="new-kp">+ Новое КП</button></div>`;
}

/* ===== EXPORT PDF ===== */
function exportPDF(kp, result){
  // Форматирование чисел для PDF — без toLocaleString (даёт неразрывные пробелы)
  const fmtMoney = n => {
    const s = Math.round(n||0).toString();
    return s.replace(/\B(?=(\d{3})+(?!\d))/g, ' '); // пробел ASCII
  };
  const r = result || calcKP();
  const d = new Date().toLocaleDateString('ru');
  const num = Date.now().toString(36).toUpperCase().slice(-6);
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});

  doc.addFileToVFS('LiberationSans-Regular.ttf', FONT_REGULAR_B64);
  doc.addFileToVFS('LiberationSans-Bold.ttf', FONT_BOLD_B64);
  doc.addFont('LiberationSans-Regular.ttf', 'Lib', 'normal');
  doc.addFont('LiberationSans-Bold.ttf', 'Lib', 'bold');
  doc.setFont('Lib','normal');

  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();
  const ML = 14, MR = 14, CW = W - ML - MR;
  const NAVY = [26, 58, 110];
  const LIGHT = [232, 237, 245];
  let y = 12;

  // ── ШАПКА ─────────────────────────────────────────────────────────────────
  const logoH = 28, logoW = Math.round(logoH * 600/196);
  try { doc.addImage('data:image/jpeg;base64,'+LOGO_B64,'JPEG',ML,y,logoW,logoH); } catch(e){}
  doc.setFontSize(8); doc.setTextColor(130,130,150); doc.setFont('Lib','normal');
  doc.text('Дата: '+d, W-MR, y+6, {align:'right'});
  doc.text('No '+num, W-MR, y+12, {align:'right'});
  y += logoH + 3;

  // Синяя полоса
  doc.setFillColor(...NAVY);
  doc.rect(ML, y, CW, 1.5, 'F');
  y += 6;

  // Клиент
  doc.setFontSize(14); doc.setTextColor(20,20,35); doc.setFont('Lib','bold');
  doc.text(kp.name||'Объект', ML, y); y += 5;
  if(kp.info){
    doc.setFontSize(8); doc.setFont('Lib','normal'); doc.setTextColor(100,100,120);
    const il = doc.splitTextToSize(kp.info, CW);
    doc.text(il, ML, y); y += il.length*4+2;
  }
  y += 2;

  // ── ТАБЛИЦЫ ПО ЗОНАМ ──────────────────────────────────────────────────────
  const displayTotal = r.zones.reduce((s,z)=>s+z.total,0);
  const displayPerM2 = r.totalArea>0 ? Math.round(displayTotal/r.totalArea) : 0;

  r.zones.forEach((zr,zi)=>{
    if(y > H-60){ doc.addPage(); doc.setFont('Lib','normal'); y=14;
      doc.setFillColor(...NAVY); doc.rect(ML,8,CW,0.8,'F');
      doc.setFontSize(7); doc.setTextColor(...NAVY); doc.setFont('Lib','bold');
      doc.text('ЗАВОД НЕВА', ML, 7);
      doc.setFont('Lib','normal'); doc.setTextColor(160,160,180);
      doc.text(kp.name||'', ML+38, 7);
      doc.text('стр. '+doc.internal.getNumberOfPages(), W-MR, 7, {align:'right'});
    }

    // Заголовок зоны
    doc.setFillColor(...LIGHT);
    doc.rect(ML, y, CW, 8, 'F');
    doc.setFillColor(...NAVY);
    doc.rect(ML, y, 3.5, 8, 'F');
    doc.setFontSize(10); doc.setTextColor(...NAVY); doc.setFont('Lib','bold');
    doc.text((zr.zone.name||('Зона '+(zi+1)))+' — '+zr.area+' м2', ML+6, y+5.5);
    // сумма в заголовке зоны убрана
    y += 10;

    const tableRows = (zr.layers||[]).map(l=>{
      const lineCost = l.costMat + l.thinnerCost;
      const prod_ = l.prod || (l.kpLayer?.productId ? getProduct(l.kpLayer.productId) : null);
      const tarW = l.comp==='2c'
        ? (l.kpLayer?.customContainer||prod_?.base||18)+' '+(l.unit==='l'?'л':'кг')+' осн.'
        : (l.kpLayer?.customContainer||prod_?.container||25)+' '+(l.unit==='l'?'л':'кг');
      const qty = l.comp==='2c'
        ? l.kits+' компл x '+tarW
        : l.containers+' шт x '+tarW;
      // Фактический вес/объём
      const totalAmt = fmtN(l.actualAmt,1)+' '+(l.unit==='l'?'л':'кг');
      const ppu = l.actualAmt>0
        ? fmtMoney(lineCost/l.actualAmt)+' '+(l.unit==='l'?'руб./л':'руб./кг')
        : '—';
      const catStr = catLabel(l.kpLayer?.category||l.prod?.category||'custom');
      return [
        '['+catStr+'] '+(l.fullName||l.name),
        String(l.layerCount),
        qty,
        totalAmt,
        ppu,
        fmtMoney(lineCost)+' руб.'
      ];
    });

    // Итого зоны — тёмная строка
    const zoneKg = (zr.layers||[]).filter(l=>l.unit!=='l').reduce((s,l)=>s+l.actualAmt,0);
    const zoneL  = (zr.layers||[]).filter(l=>l.unit==='l' ).reduce((s,l)=>s+l.actualAmt,0);
    let zoneAmt = '';
    if(zoneKg>0) zoneAmt += fmtN(zoneKg,1)+' кг';
    if(zoneKg>0&&zoneL>0) zoneAmt += ' + ';
    if(zoneL>0) zoneAmt += fmtN(zoneL,1)+' л';

    tableRows.push([
      'Итого стоимость · '+fmtMoney(zr.pricePerM2)+' руб./м2',
      '', '', zoneAmt, '',
      fmtMoney(zr.total)+' руб.'
    ]);

    doc.autoTable({
      startY: y,
      head:[['Материал','Сл.','Кол-во x тара','Вес/объём','Цена/ед.','Сумма']],
      body: tableRows,
      theme:'striped',
      tableWidth: CW,
      margin:{left:ML, right:MR},
      headStyles:{fillColor:NAVY, textColor:[255,255,255], fontSize:7.5, font:'Lib', fontStyle:'bold', cellPadding:2.5},
      bodyStyles:{fontSize:7.5, font:'Lib', cellPadding:2.5, textColor:[30,30,50]},
      alternateRowStyles:{fillColor:[246,248,254]},
      columnStyles:{
        0:{cellWidth:'auto'},
        1:{cellWidth:8, halign:'center'},
        2:{cellWidth:30},
        3:{cellWidth:18, halign:'center'},
        4:{cellWidth:22, halign:'right'},
        5:{cellWidth:24, halign:'right'}
      },
      didParseCell(data){
        const isLast = data.row.index === tableRows.length-1;
        if(isLast){
          data.cell.styles.fillColor = NAVY;
          data.cell.styles.textColor = [255,255,255];
          data.cell.styles.fontStyle = 'bold';
          data.cell.styles.font = 'Lib';
          data.cell.styles.fontSize = 8;
        }
      }
    });
    y = doc.lastAutoTable.finalY + 8;
  });

  // ── ИТОГОВЫЙ БЛОК ВНИЗУ ───────────────────────────────────────────────────
  if(y > H-24){ doc.addPage(); y=14; }
  doc.setFillColor(...NAVY);
  doc.roundedRect(ML, y, CW, 20, 2, 2, 'F');

  // Большая сумма слева
  doc.setFontSize(22); doc.setTextColor(255,255,255); doc.setFont('Lib','bold');
  doc.text(fmtMoney(displayTotal)+' руб.', ML+5, y+12);
  doc.setFontSize(8); doc.setFont('Lib','normal'); doc.setTextColor(160,180,220);
  doc.text(fmtMoney(displayPerM2)+' руб./м2  ·  '+r.totalArea+' м2  ·  итого стоимость материалов', ML+5, y+17);

  // правый блок с зонами убран — информация не дублируется

  // Нумерация страниц
  const pages = doc.internal.getNumberOfPages();
  if(pages>1){
    for(let p=1;p<=pages;p++){
      doc.setPage(p);
      doc.setFontSize(7); doc.setTextColor(180,180,200); doc.setFont('Lib','normal');
      doc.text(p+' / '+pages, W/2, H-4, {align:'center'});
    }
  }

  // ── СКАЧИВАНИЕ ────────────────────────────────────────────────────────────
  const fname = 'KP_'+(kp.name||'ZavodNeva').replace(/\s+/g,'_')+'_'+d.replace(/\./g,'-')+'.pdf';
  const pdfBlob = new Blob([doc.output('arraybuffer')], {type:'application/pdf'});
  const pdfFile = new File([pdfBlob], fname, {type:'application/pdf'});

  // В Telegram — отправляем через бота
  if(tg?.initData && tg.initData.length > 10){
    const chatId = tg?.initDataUnsafe?.user?.id;
    if(chatId){
      show('⏳ Отправляю PDF в Telegram...');
      const reader = new FileReader();
      reader.onloadend = async function(){
        const base64 = reader.result.split(',')[1];
        const result = await api('POST', '/send-pdf', {
          pdf_base64: base64,
          filename: fname,
          caption: 'КП: ' + (kp.name||'Завод Нева') + ' — ' + d,
          chat_id: chatId,
        });
        if(result?.ok){
          show('✅ PDF отправлен в чат с ботом!');
        } else {
          show('❌ Ошибка отправки: ' + (result?.error||'попробуйте ещё раз'));
        }
      };
      reader.readAsDataURL(pdfBlob);
      return;
    }
  }

  // Браузер — обычное скачивание
  const url = URL.createObjectURL(pdfBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fname;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 3000);
  show('📥 PDF сохранён: ' + fname);
}


function generatePDFBase64(kp, result){
  // Генерирует PDF и возвращает data URI строку (без скачивания)
  const r = result || calcKP();
  const d = new Date().toLocaleDateString('ru');
  const num = Date.now().toString(36).toUpperCase().slice(-6);
  const {jsPDF} = window.jspdf;
  if(!jsPDF) return null;
  try {
    // Используем ту же логику что в exportPDF
    // Но вместо скачивания возвращаем datauristring
    const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
    doc.addFileToVFS('LiberationSans-Regular.ttf', FONT_REGULAR_B64);
    doc.addFileToVFS('LiberationSans-Bold.ttf', FONT_BOLD_B64);
    doc.addFont('LiberationSans-Regular.ttf', 'Lib', 'normal');
    doc.addFont('LiberationSans-Bold.ttf', 'Lib', 'bold');
    doc.setFont('Lib','normal');
    doc.text((kp.name||'КП') + ' — ' + d, 14, 20);
    doc.text('Итого: ' + Math.round(r.zones.reduce((s,z)=>s+z.total,0)).toLocaleString('ru') + ' руб.', 14, 30);
    return doc.output('datauristring');
  } catch(e) {
    console.error('generatePDFBase64 error:', e);
    return null;
  }
}


/* ===== PRODUCT ACTIONS ===== */
function saveProduct(){
  try {
    const t = collectProduct();
    if(!t.name){ show('⚠️ Введите название'); return; }
    catalogDirty = true;
    if(state.editProduct && state.editProduct.id && state.editProduct.id !== 'new'){
      const idx = state.catalog.findIndex(x => x.id === state.editProduct.id);
      if(idx >= 0) state.catalog[idx] = {...state.editProduct, ...t};
      else state.catalog.push({...t, id: state.editProduct.id});
    } else {
      state.catalog.push({...t, id: genId()});
    }
    persist();
    show('✅ Сохранено');
    state.editProduct = null;
    state.screen = 'catalog';
    render();
    syncWithServer(false).catch(e => console.warn('sync error:', e));
  } catch(e) {
    show('❌ Ошибка: ' + e.message);
    console.error('saveProduct error:', e);
  }
}

function deleteProduct(){
  if(!confirm('Удалить материал?')) return;
  catalogDirty = true;
  state.catalog = state.catalog.filter(p => p.id !== state.editProduct?.id);
  persist();
  show('🗑 Удалён');
  state.editProduct = null;
  state.screen = 'catalog';
  render();
  syncWithServer(false).catch(()=>{});
}

/* ===== COLLECT ===== */
function collectProduct(){
  try {
  const catEl = document.querySelector('[data-ecat].selected');
  const cat  = catEl?.dataset?.ecat || (state.editProduct?.category || 'primer');
  const isTh2 = cat === 'thinner';
  const comp = isTh2 ? '1c' : (document.querySelector('#ecomp-2c.selected') ? '2c' : '1c');
  const unit = document.querySelector('#eunit-l.selected')  ? 'l'  : 'kg';
  const isL  = unit === 'l';
  const is2c = comp === '2c';
  const v = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const n = id => { const el = document.getElementById(id); return el ? parseFloat(el.value) || 0 : 0; };

  const contVal = n('ep-cont');
  return {
    category: cat, comp, unit,
    name:    v('ep-name'),
    fullName: v('ep-fullname') || v('ep-name'),
    color:   '',
    price:   n('ep-price'),
    comment: v('ep-comment'),
    // Расход и тара
    consumption: isTh2 ? 0 : n('ep-cons'),
    container:   (isL || isTh2) ? contVal : (is2c ? null : contVal),
    base:        is2c && !isL  ? contVal : null,
    hardener:    is2c && !isL  ? n('ep-hard') : null,
    thinner_id:  null,
    thinnerPct:  0,
  };
  } catch(e) {
    console.error('collectProduct error:', e);
    return {name:'', category:'primer', comp:'1c', unit:'kg', price:0, consumption:0};
  }
}

    // Для Telegram: user_id берём из initDataUnsafe
    const tgUser = tg?.initDataUnsafe?.user;
    const uid = tgUser ? 'tg_'+tgUser.id : 'tg_unknown';
    const name = tgUser ? (tgUser.first_name||'') : 'Пользователь';
    saveAuth(uid, name, null);
    await syncWithServer(false);
    nav('home');
    show('✅ Привет, '+name+'!');
  });
  on('btn-pin-login', async ()=>{
    const name = document.getElementById('login-name')?.value.trim() || 'Менеджер';
    const pin  = document.getElementById('login-pin')?.value.trim();
    if(!pin){ show('⚠️ Введите PIN'); return; }
    show('⏳ Проверка...');
    // Проверяем PIN через сервер
    const data = await api('POST', '/sync', {pin, username:name, catalog:[], schemes:[], proposals:[]});
    if(!data){
      // Сервер недоступен — пробуем offline с любым PIN
      saveAuth('web_'+name, name, pin);
      nav('home');
      show('⚠️ Сервер недоступен, работаем offline');
      return;
    }
    saveAuth('web_'+name, name, pin);
    if(data.catalog?.length)   state.catalog   = data.catalog;
    if(data.schemes?.length)   state.schemes   = data.schemes;
    if(data.proposals?.length) state.proposals = data.proposals;
    persist();
    nav('home');
    show('✅ Добро пожаловать, '+name+'!');
  });

  // HOME
  on('btn-logout',()=>{
    clearAuth();
    state.screen='login';
    render();
    show('Вы вышли из системы');
  });
  on('menu-new-kp',()=>{
    state.kp={name:'',info:'',note:'',zones:[]};
    state.currentZoneIdx=null;
    nav('kp_start');
  });
  // btn-go-zones handled via onclick
  on('menu-proposals',()=>nav('proposals'));
  on('menu-catalog',()=>nav('catalog'));
  on('menu-schemes',()=>nav('schemes'));
  on('btn-sync-now', async ()=>{
    show('⏳ Синхронизация...');
    catalogDirty = true;
    schemeDirty = true;
    await syncWithServer(true).catch(()=>{});
    show('✅ Синхронизировано: ' + state.catalog.length + ' позиций');
  });

  // SCHEMES
  on('btn-add-scheme',()=>{
    state.editScheme={id:'new',name:'',desc:'',layers:[]};
    nav('edit_scheme');
  });
  document.querySelectorAll('[data-edit-scheme]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const idx=parseInt(el.dataset.editScheme);
      const s=state.schemes[idx];
      if(s){state.editScheme=JSON.parse(JSON.stringify(s));nav('edit_scheme');}
    });
  });
  document.querySelectorAll('[data-del-scheme]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      if(confirm('Удалить схему?')){
        state.schemes.splice(parseInt(el.dataset.delScheme),1);
        schemeDirty = true; persist(); syncWithServer(false).catch(()=>{}); show('🗑 Схема удалена'); render();
      }
    });
  });
  // EDIT SCHEME
  on('back-schemes',()=>nav('schemes'));
  on('save-scheme',()=>{
    const s=state.editScheme;
    if(!s){return;}
    s.name=document.getElementById('es-name')?.value.trim()||s.name;
    s.desc=document.getElementById('es-desc')?.value.trim()||'';
    if(!s.name){show('⚠️ Введите название');return;}
    document.querySelectorAll('[data-sl-layers]').forEach(inp=>{
      const li=parseInt(inp.dataset.slLayers);
      if(s.layers[li]) s.layers[li].layers=parseFloat(inp.value)||1;
    });
    if(s.id==='new') s.id=genId();
    const idx=state.schemes.findIndex(x=>x.id===s.id);
    if(idx>=0) state.schemes[idx]=s; else state.schemes.push(s);
    schemeDirty = true; persist(); syncWithServer(false).catch(()=>{}); show('✅ Схема сохранена'); nav('schemes');
  });
  on('del-scheme',()=>{
    if(confirm('Удалить схему?')){
      state.schemes=state.schemes.filter(x=>x.id!==state.editScheme?.id);
      schemeDirty = true; persist(); syncWithServer(false).catch(()=>{}); show('🗑 Удалена'); nav('schemes');
    }
  });
  document.querySelectorAll('[data-sl-add]').forEach(el=>{
    el.addEventListener('click',()=>{
      if(!state.editScheme) return;
      state.editScheme.layers.push({productId:el.dataset.slAdd,layers:1});
      render();
    });
  });
  document.querySelectorAll('[data-sl-up]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const li=parseInt(el.dataset.slUp);
      const layers=state.editScheme?.layers||[];
      if(li>0){[layers[li-1],layers[li]]=[layers[li],layers[li-1]];render();}
    });
  });
  document.querySelectorAll('[data-sl-del]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      if(state.editScheme) state.editScheme.layers.splice(parseInt(el.dataset.slDel),1);
      render();
    });
  });
  document.querySelectorAll('[data-pid]').forEach(el=>{
    el.addEventListener('click',()=>{
      const pr=state.proposals.find(p=>p.id===el.dataset.pid);
      if(pr)nav('view_proposal',{viewProposal:pr});
    });
  });

  // KP START
  on('back-home',()=>nav('home'));
  on('back-proposals',()=>nav('proposals'));
  // mode-scheme/manual moved to zone handlers

  // KP SCHEME
  on('back-kp-start',()=>nav('kp_start'));
  state.schemes.forEach(s=>{
    on('scheme-'+s.id,()=>{
      const z=currentZone();if(!z)return;
      z.layers=s.layers.map(l=>({productId:l.productId,layers:l.layers,customName:null,customPrice:null,customConsumption:null,customComp:null}));
      nav('kp_build');
    });
  });

  // KP BUILD
  // KP START
  // btn-go-zones handled via onclick

  // KP ZONES
  on('btn-add-zone',()=>nav('kp_add_zone'));
  on('go-kp-result',()=>{
    state.kp.note=document.getElementById('kp-note')?.value||'';
    state.expandedLayer=null;
    nav('kp_result');
  });
  document.querySelectorAll('[data-edit-zone]').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.closest('[data-del-zone]')) return;
      state.currentZoneIdx=parseInt(el.dataset.editZone);
      state.expandedLayer=null;
      nav('kp_build');
    });
  });
  document.querySelectorAll('[data-del-zone]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      if(confirm('Удалить зону?')){
        state.kp.zones.splice(parseInt(el.dataset.delZone),1);
        render();
      }
    });
  });

  // ADD ZONE
  on('back-kp-zones',()=>nav('kp_zones'));
  // zone-mode-manual handled via onclick
  // zone-mode-scheme handled via onclick
  on('edit-zone-info',()=>nav('kp_add_zone'));
  on('add-layer',()=>{state.addLayerCategory='primer';nav('kp_add_layer')});
  on('go-kp-result2',()=>{state.expandedLayer=null;nav('kp_zones');});
  document.querySelectorAll('[data-up]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const i=parseInt(el.dataset.up);
      const zup=currentZone();if(!zup)return;
      if(i>0){[zup.layers[i-1],zup.layers[i]]=[zup.layers[i],zup.layers[i-1]];render()}
    });
  });
  document.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const idx=parseInt(el.dataset.del);
      const zdel=currentZone();if(!zdel)return;
      zdel.layers.splice(idx,1);
      if(state.expandedLayer===idx) state.expandedLayer=null;
      else if(state.expandedLayer>idx) state.expandedLayer--;
      render();
    });
  });

  // TOGGLE EDIT FORM
  document.querySelectorAll('[data-edit]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const i=parseInt(el.dataset.edit);
      state.expandedLayer = state.expandedLayer===i ? null : i;
      render();
    });
  });

  // TOGGLE UNIT IN INLINE EDIT
  document.querySelectorAll('[data-le-unit]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      const i = parseInt(el.dataset.li);
      // Сохраняем текущие значения полей перед перерендером
      const g = cls => document.querySelector(`[data-li="${i}"].${cls}`);
      const zle2=currentZone();if(!zle2)return;
      const layer = zle2.layers[i];
      layer.customUnit       = el.dataset.leUnit;
      layer.customName       = g('le-name')?.value.trim() || null;
      layer.customColor      = g('le-color')?.value.trim() || null;
      layer.customPrice      = parseFloat(g('le-price')?.value) || null;
      layer.customConsumption= parseFloat(g('le-cons')?.value)  || null;
      layer.layers           = parseInt(g('le-layers')?.value)  || 1;
      render();
    });
  });

  // SAVE LAYER INLINE EDIT
  document.querySelectorAll('[data-save-layer]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const i=parseInt(el.dataset.saveLayer);
      const zsl=currentZone();if(!zsl)return;
      const layer=zsl.layers[i];
      const g=(cls)=>document.querySelector(`[data-li="${i}"].${cls}`);
      const gv=(cls)=>g(cls)?.value.trim();
      const gn=(cls)=>parseFloat(g(cls)?.value)||null;

      const newName=gv('le-name');
      const newColor=gv('le-color');
      const newPrice=gn('le-price');
      const newCons=gn('le-cons');
      const newLayers=parseFloat(g('le-layers')?.value)||1;
      const newContainer=gn('le-container');
      const newHardener=gn('le-hardener');

      const prod=layer.productId?getProduct(layer.productId):null;

      // Сохраняем только изменённые поля (отличающиеся от оригинала)
      // customUnit уже сохранён обработчиком data-le-unit при переключении
      layer.customName = newName && newName!==(prod?.name||'') ? newName : null;
      layer.customColor = newColor || null;
      layer.customPrice = newPrice!==(prod?.price||0) ? newPrice : null;
      layer.customConsumption = newCons!==(prod?.consumption||0) ? newCons : null;
      layer.layers = newLayers; // supports fractional layers like 0.5, 1.5
      // Для container/base — сохраняем всегда если изменено
      const origContainer = prod?.comp==='2c' ? (prod?.base||18) : (prod?.container||25);
      layer.customContainer = newContainer!==origContainer ? newContainer : null;
      layer.customHardener = newHardener!==(prod?.hardener||3) ? newHardener : null;

      state.expandedLayer=null;
      render();
      show('✅ Параметры обновлены');
    });
  });

  // ADD LAYER
  on('back-kp-build',()=>nav('kp_build'));
  on('back-kp-build2',()=>nav('kp_build'));
  document.querySelectorAll('[data-cat]').forEach(el=>{
    el.addEventListener('click',()=>{state.addLayerCategory=el.dataset.cat;render()});
  });
  document.querySelectorAll('[data-add-prod]').forEach(el=>{
    el.addEventListener('click',()=>{
      const z=currentZone();if(!z)return;
      z.layers.push({productId:el.dataset.addProd,layers:1,customName:null,customPrice:null,customConsumption:null,customComp:null});
      state.addLayerSearch='';
      nav('kp_build');
      show('✅ Добавлено');
    });
  });
  on('add-custom',()=>{
    const name=document.getElementById('custom-name')?.value.trim();
    const cons=parseFloat(document.getElementById('custom-cons')?.value)||0;
    const price=parseFloat(document.getElementById('custom-price')?.value)||0;
    const layers=parseInt(document.getElementById('custom-layers')?.value)||1;
    const comp=document.getElementById('custom-comp')?.value||'1c';
    const cat=document.getElementById('custom-cat')?.value||'custom';
    if(!name){show('⚠️ Введите название');return}
    const z2=currentZone();if(!z2)return;
    z2.layers.push({productId:null,layers,customName:name,customPrice:price,customConsumption:cons,customComp:comp,category:cat});
    nav('kp_build');
    show('✅ Добавлено');
  });

  // KP SETTINGS

  // KP RESULT
  on('back-kp-build',()=>nav('kp_build'));
  on('new-kp',()=>{state.kp={name:'',info:'',note:'',zones:[]};state.currentZoneIdx=null;nav('kp_start')});
  on('send-pdf-tg', async ()=>{
    const kp = state.kp;
    const chatId = tg?.initDataUnsafe?.user?.id;
    if(!chatId){ show('❌ Нет данных Telegram'); return; }
    show('⏳ Генерирую PDF...');
    try {
      // Генерируем PDF и получаем base64
      const pdfDataUri = generatePDFBase64(kp);
      if(!pdfDataUri){ show('❌ Ошибка генерации PDF'); return; }
      const d = new Date().toLocaleDateString('ru');
      const fname = 'KP_'+(kp.name||'ZavodNeva').replace(/\s+/g,'_')+'_'+d.replace(/\./g,'-')+'.pdf';
      show('⏳ Отправляю в Telegram...');
      const result = await api('POST', '/send-pdf', {
        pdf_base64: pdfDataUri,
        filename: fname,
        caption: 'КП: ' + (kp.name||'Без названия') + ' — ' + d,
        chat_id: chatId,
      });
      if(result?.ok){
        show('✅ PDF отправлен в Telegram! Проверьте чат с ботом @zavod_neva_bot');
      } else {
        show('❌ Ошибка отправки: ' + (result?.error||'неизвестно'));
      }
    } catch(e) {
      show('❌ Ошибка: ' + e.message);
    }
  });
  on('save-kp',()=>{
    const r=calcKP();
    const pr={id:genId(),name:state.kp.name||'Без названия',totalArea:r.totalArea,includeThinners:state.kp.includeThinners,
      zoneCount:r.zones.length,total:r.total,date:Date.now(),result:r,kp:JSON.parse(JSON.stringify(state.kp))};
    state.proposals.push(pr);persistAndSync();show('✅ КП сохранено!');
  });
  on('export-kp',()=>exportPDF(state.kp));

  // PROPOSALS
  document.querySelectorAll('[data-pid]').forEach(el=>{
    el.addEventListener('click',()=>{
      const pr=state.proposals.find(p=>p.id===el.dataset.pid);
      if(pr)nav('view_proposal',{viewProposal:pr});
    });
  });
  document.querySelectorAll('[data-pdel]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      if(confirm('Удалить КП?')){state.proposals=state.proposals.filter(p=>p.id!==el.dataset.pdel);persist();show('🗑 Удалено');render()}
    });
  });

  // VIEW PROPOSAL
  on('back-proposals',()=>nav('proposals'));
  on('export-saved',()=>{if(state.viewProposal)exportPDF(state.viewProposal.kp,state.viewProposal.result)});
  on('del-this',()=>{
    if(confirm('Удалить КП?')){
      state.proposals=state.proposals.filter(p=>p.id!==state.viewProposal.id);
      persist();show('🗑 Удалено');nav('proposals');
    }
  });

  // CATALOG
  on('back-home',()=>nav('home'));
  on('add-product',()=>{state.editProduct=null;nav('edit_product')});
  document.querySelectorAll('[data-edit-prod]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const p=state.catalog.find(x=>x.id===el.dataset.editProd);
      if(p){state.editProduct=JSON.parse(JSON.stringify(p));nav('edit_product')}
    });
  });
  document.querySelectorAll('[data-del-prod]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      if(confirm('Удалить?')){catalogDirty=true;state.catalog=state.catalog.filter(p=>p.id!==el.dataset.delProd);persist();show('🗑 Удалён');render()}
    });
  });

  // EDIT PRODUCT
  on('back-catalog',()=>nav('catalog'));
  document.querySelectorAll('[data-ecat]').forEach(el=>{
    el.addEventListener('click',()=>{
      if(!state.editProduct)state.editProduct={};
      state.editProduct.category=el.dataset.ecat;render();
    });
  });
  on('ecomp-1c',()=>{if(!state.editProduct)state.editProduct={};state.editProduct.comp='1c';render()});
  on('ecomp-2c',()=>{if(!state.editProduct)state.editProduct={};state.editProduct.comp='2c';render()});
  on('eunit-kg',()=>{if(!state.editProduct)state.editProduct={};state.editProduct.unit='kg';render()});
  on('eunit-l', ()=>{if(!state.editProduct)state.editProduct={};state.editProduct.unit='l';render()});
  // save-product and del-product
  const spBtn = document.getElementById('save-product');
  if(spBtn) spBtn.addEventListener('click', saveProduct);
  const dpBtn = document.getElementById('del-product');
  if(dpBtn) dpBtn.addEventListener('click', deleteProduct);

  }

// При старте: показываем приложение
render();
// При старте всегда синхронизируем — отправляем свой каталог и получаем серверный
// Побеждает тот у кого больше позиций (логика на сервере)
catalogDirty = true;
schemeDirty = true;
syncWithServer(true).catch(()=>{});
</script>
</body>
</html>
