<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ПолКоат КП</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#222536;--bg4:#2a2e42;
  --accent:#5b7fff;--accent2:#7c9fff;--accentDim:rgba(91,127,255,.15);
  --text:#e8eaf2;--text2:#9ba3bf;--text3:#5a6282;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --success:#3dd68c;--warning:#f5a623;--danger:#ff5e7a;
  --r:12px;--r2:8px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Onest',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
#scroll-root{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
.app{max-width:420px;margin:0 auto;padding:16px 12px 80px}

.header{display:flex;align-items:center;gap:10px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.logo{width:36px;height:36px;background:var(--accentDim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.header-sub{font-size:12px;color:var(--text3)}

.stepper{display:flex;align-items:center;gap:0;margin-bottom:24px}
.step-dot{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text3);flex-shrink:0;transition:.2s}
.step-dot.active{background:var(--accent);border-color:var(--accent);color:#fff}
.step-dot.done{background:var(--accentDim);border-color:var(--accent);color:var(--accent2)}
.step-line{flex:1;height:1.5px;background:var(--border);transition:.2s}
.step-line.done{background:var(--accent)}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}

label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:10px 12px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:.15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--bg4)}
input::placeholder{color:var(--text3)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:70px}
.field{margin-bottom:14px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;border-radius:var(--r2);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:.15s;width:100%}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#4a6eff}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{background:var(--bg4)}
.btn-danger{background:rgba(255,94,122,.12);color:var(--danger);border:1px solid rgba(255,94,122,.25)}
.btn-success{background:rgba(61,214,140,.12);color:var(--success);border:1px solid rgba(61,214,140,.25)}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn-row .btn{flex:1}
.btn[disabled]{opacity:.4;pointer-events:none}

.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.type-card{background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--r);padding:14px 10px;cursor:pointer;text-align:center;transition:.2s;user-select:none}
.type-card.selected{border-color:var(--accent);background:var(--accentDim)}
.type-card:active{transform:scale(.97)}
.type-card-icon{font-size:22px;margin-bottom:6px}
.type-card-name{font-size:13px;font-weight:600}
.type-card-sub{font-size:11px;color:var(--text3);margin-top:2px}

.mat-card{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;transition:.2s;margin-bottom:8px;display:flex;align-items:center;gap:10px;user-select:none}
.mat-card.selected{border-color:var(--accent);background:var(--accentDim)}
.mat-card:active{transform:scale(.98)}
.mat-badge{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.mat-info{flex:1;min-width:0}
.mat-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mat-sub{font-size:11px;color:var(--text3);margin-top:1px}
.mat-price{font-size:13px;font-weight:600;color:var(--accent2);flex-shrink:0}

.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.metric{background:var(--bg3);border-radius:var(--r2);padding:12px;text-align:center}
.metric-val{font-size:20px;font-weight:700;color:var(--accent2)}
.metric-label{font-size:11px;color:var(--text3);margin-top:3px}
.price-big{font-size:28px;font-weight:700;color:var(--success);text-align:center;padding:16px 0}
.price-label{font-size:12px;color:var(--text3);text-align:center;margin-top:-8px;margin-bottom:16px}

.breakdown{background:var(--bg3);border-radius:var(--r2);overflow:hidden;margin-bottom:16px}
.brow{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)}
.brow:last-child{border-bottom:none}
.brow-label{font-size:12px;color:var(--text2)}
.brow-val{font-size:13px;font-weight:600}

.alert{border-radius:var(--r2);padding:10px 12px;font-size:12px;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start}
.alert-info{background:rgba(91,127,255,.1);border:1px solid rgba(91,127,255,.25);color:var(--accent2)}
.alert-warn{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.25);color:var(--warning)}
.alert-success{background:rgba(61,214,140,.1);border:1px solid rgba(61,214,140,.25);color:var(--success)}

.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-1c{background:rgba(91,127,255,.15);color:var(--accent2)}
.tag-2c{background:rgba(61,214,140,.15);color:var(--success)}

.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;margin-top:4px}

.check-row{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 0}
.check-row input[type=checkbox]{width:17px;height:17px;flex-shrink:0;accent-color:var(--accent)}

.nav{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.nav-back{background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit;display:flex;align-items:center;gap:4px;padding:0;line-height:1}
.nav-back:active{color:var(--accent)}
.nav-title{font-size:15px;font-weight:700;flex:1}

.snack{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-overflow:ellipsis;overflow:hidden}
.snack.show{opacity:1}

.empty{text-align:center;padding:40px 16px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:8px}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.fab{position:fixed;bottom:24px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(91,127,255,.4);border:none;z-index:50;transition:.2s}
.fab:active{transform:scale(.92)}
</style>
</head>
<body>
<div id="scroll-root">
  <div class="app"><div id="root"></div></div>
</div>
<div class="snack" id="snack"></div>

<script>
/* ===== TELEGRAM INIT ===== */
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  // Используем тему Telegram если доступна
  const c = tg.colorScheme;
  if (c === 'light') {
    document.documentElement.style.setProperty('--bg', '#f2f4f8');
    document.documentElement.style.setProperty('--bg2', '#ffffff');
    document.documentElement.style.setProperty('--bg3', '#f0f2f7');
    document.documentElement.style.setProperty('--bg4', '#e4e8f0');
    document.documentElement.style.setProperty('--text', '#1a1d27');
    document.documentElement.style.setProperty('--text2', '#4a5270');
    document.documentElement.style.setProperty('--text3', '#8892b0');
    document.documentElement.style.setProperty('--border', 'rgba(0,0,0,.07)');
    document.documentElement.style.setProperty('--border2', 'rgba(0,0,0,.12)');
  }
}

/* ===== STORAGE ===== */
const STORAGE_KEY = 'polcoat_v2';

const DEFAULT_TEMPLATES = [
  {id:'t1',name:'Эпоксидная грунтовка ЭП-001',type:'1c',color:'Прозрачный',price:850,
   consumption:200,layers:2,primer_consumption:150,container_type:'Ведро',container_weight:25,
   thinner:'Р-646',thinnerPct:10,comment:'Укрепляющий грунт для бетона',notes:''},
  {id:'t2',name:'Полиуретановая эмаль ПУ-220',type:'2c',color:'RAL 7040 Серый',price:1200,
   consumption:300,layers:3,primer_consumption:180,container_type:'Комплект',container_weight:21,
   base:18,hardener:3,thinner:'Уайт-спирит',thinnerPct:5,comment:'Финишное покрытие',notes:''},
  {id:'t3',name:'Эпоксидная краска ЭП-140',type:'2c',color:'RAL 7035 Светло-серый',price:980,
   consumption:350,layers:2,primer_consumption:200,container_type:'Комплект',container_weight:20,
   base:16,hardener:4,thinner:'Ксилол',thinnerPct:8,comment:'Для производственных помещений',notes:''},
  {id:'t4',name:'Акриловая эмаль АК-511',type:'1c',color:'RAL 7042 Серый дорожный',price:650,
   consumption:250,layers:3,primer_consumption:160,container_type:'Ведро',container_weight:20,
   thinner:'Вода',thinnerPct:15,comment:'Водная база, низкий запах',notes:''},
  {id:'t5',name:'Полиуретановый лак ПУ-ЛАК',type:'2c',color:'Бесцветный',price:1450,
   consumption:180,layers:2,primer_consumption:120,container_type:'Комплект',container_weight:10,
   base:8,hardener:2,thinner:'Растворитель 646',thinnerPct:5,comment:'Финишный защитный лак',notes:''},
];

function loadData() {
  try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : null; } catch { return null; }
}
function saveData(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

const state = (() => {
  const saved = loadData();
  return {
    screen: 'home',
    templates: saved?.templates || JSON.parse(JSON.stringify(DEFAULT_TEMPLATES)),
    proposals: saved?.proposals || [],
    current: { name: '', area: '', type: '1c', templateId: '', params: {} },
    editTemplate: null,
    viewProposal: null,
  };
})();

function persist() { saveData({ templates: state.templates, proposals: state.proposals }); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

/* ===== CALC ===== */
function calcProposal(area, tpl) {
  const a = parseFloat(area) || 0;
  if (!a || !tpl) return null;
  if (tpl.type === '1c') {
    const primerTotal = a * (tpl.primer_consumption / 1000);
    const mainTotal = a * (tpl.consumption / 1000) * (tpl.layers - 1);
    const totalKg = primerTotal + mainTotal;
    const thinnerKg = primerTotal * (tpl.thinnerPct / 100);
    const cw = parseFloat(tpl.container_weight) || 25;
    const containers = Math.ceil(totalKg / cw);
    const actualKg = containers * cw;
    const costMat = Math.round(actualKg * tpl.price / 1000 * 100) / 100;
    return { type: '1c', area: a, primerTotal: +primerTotal.toFixed(2), mainTotal: +mainTotal.toFixed(2),
      totalKg: +totalKg.toFixed(2), thinnerKg: +thinnerKg.toFixed(2), containers, actualKg,
      costMat: Math.round(costMat), containerWeight: cw, layers: tpl.layers };
  } else {
    const primerTotal = a * (tpl.primer_consumption / 1000);
    const mainTotal = a * (tpl.consumption / 1000) * (tpl.layers - 1);
    const totalBase = primerTotal + mainTotal;
    const base = parseFloat(tpl.base) || 18;
    const hardener = parseFloat(tpl.hardener) || 3;
    const kitsNeeded = Math.ceil(totalBase / base);
    const totalKg = kitsNeeded * (base + hardener);
    const thinnerKg = primerTotal * (tpl.thinnerPct / 100);
    const costMat = Math.round(totalKg * tpl.price / 1000 * 100) / 100;
    return { type: '2c', area: a, primerTotal: +primerTotal.toFixed(2), mainTotal: +mainTotal.toFixed(2),
      totalBase: +totalBase.toFixed(2), thinnerKg: +thinnerKg.toFixed(2), kitsNeeded, basePerKit: base,
      hardenerPerKit: hardener, totalKg: +totalKg.toFixed(2), costMat: Math.round(costMat), layers: tpl.layers };
  }
}

/* ===== UI UTILS ===== */
function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function show(msg) {
  const el = document.getElementById('snack');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2400);
}
function nav(screen, extra = {}) {
  state.screen = screen; Object.assign(state, extra);
  render();
  const sr = document.getElementById('scroll-root');
  if (sr) sr.scrollTop = 0;
}

/* ===== STEPPER ===== */
function stepper(active) {
  const steps = ['1', '2', '3', '✓'];
  return `<div class="stepper">${steps.map((s, i) => {
    const cls = i < active ? 'done' : i === active ? 'active' : '';
    const line = i < steps.length - 1 ? `<div class="step-line${i < active ? ' done' : ''}"></div>` : '';
    return `<div class="step-dot ${cls}">${i < active ? '✓' : s}</div>${line}`;
  }).join('')}</div>`;
}

/* ===== RENDERS ===== */
function renderHome() {
  const p = state.proposals;
  return `
  <div class="header">
    <div class="logo">🏭</div>
    <div>
      <div class="header-title">ПолКоат КП</div>
      <div class="header-sub">Расчёт коммерческих предложений</div>
    </div>
  </div>
  <div class="type-grid" style="margin-bottom:16px">
    <div class="type-card" id="btn-new">
      <div class="type-card-icon">📋</div>
      <div class="type-card-name">Новое КП</div>
      <div class="type-card-sub">Создать расчёт</div>
    </div>
    <div class="type-card" id="btn-proposals">
      <div class="type-card-icon">📁</div>
      <div class="type-card-name">Мои КП</div>
      <div class="type-card-sub">${p.length} сохранено</div>
    </div>
  </div>
  <div class="card" id="btn-templates" style="cursor:pointer;display:flex;align-items:center;gap:10px">
    <div style="font-size:22px">🗂</div>
    <div><div style="font-weight:600;font-size:14px">База шаблонов</div>
    <div style="font-size:12px;color:var(--text3)">${state.templates.length} материалов</div></div>
    <div style="margin-left:auto;color:var(--text3);font-size:20px">›</div>
  </div>
  ${p.length > 0 ? `
  <div style="margin-top:20px">
    <div class="section-title">Последние КП</div>
    ${p.slice(-3).reverse().map(pr => `
    <div class="mat-card" data-pid="${pr.id}">
      <div class="mat-badge" style="background:var(--accentDim);color:var(--accent2)">КП</div>
      <div class="mat-info"><div class="mat-name">${esc(pr.name)}</div>
      <div class="mat-sub">${pr.area} м² · ${esc(pr.matName)}</div></div>
      <div class="mat-price">${pr.total.toLocaleString('ru')} ₸</div>
    </div>`).join('')}
  </div>` : ''}`;
}

function renderStep1() {
  const c = state.current;
  return `${stepper(0)}
  <div class="nav"><div class="nav-title">Объект и площадь</div></div>
  <div class="card">
    <div class="field"><label>Название объекта / клиент</label>
      <input id="inp-name" type="text" placeholder="Напр: ООО Альфа, склад №2" value="${esc(c.name)}"></div>
    <div class="field"><label>Площадь (м²)</label>
      <input id="inp-area" type="number" inputmode="decimal" placeholder="1000" min="1" value="${c.area}"></div>
  </div>
  <div class="section-title">Тип системы</div>
  <div class="type-grid">
    <div class="type-card${c.type === '1c' ? ' selected' : ''}" id="type-1c">
      <div class="type-card-icon">🟦</div>
      <div class="type-card-name">Однокомпонентная</div>
      <div class="type-card-sub">Без отвердителя</div></div>
    <div class="type-card${c.type === '2c' ? ' selected' : ''}" id="type-2c">
      <div class="type-card-icon">🟩</div>
      <div class="type-card-name">Двухкомпонентная</div>
      <div class="type-card-sub">Основа + отвердитель</div></div>
  </div>
  <div class="btn-row"><button class="btn btn-primary" id="btn-next1">Далее →</button></div>`;
}

function renderStep2() {
  const c = state.current;
  const tpls = state.templates.filter(t => t.type === c.type);
  return `${stepper(1)}
  <div class="nav"><button class="nav-back" id="btn-back2">← Назад</button>
    <div class="nav-title">Выбор материала</div></div>
  <div class="alert alert-info">💡 Выберите шаблон. Все параметры можно отредактировать на следующем шаге.</div>
  ${tpls.length === 0 ? `<div class="empty"><div class="empty-icon">📦</div>
    Нет шаблонов типа ${c.type === '1c' ? '1К' : '2К'}.<br>Добавьте в базе шаблонов.</div>` : ''}
  ${tpls.map(t => `
  <div class="mat-card${c.templateId === t.id ? ' selected' : ''}" data-tid="${t.id}">
    <div class="mat-badge" style="background:${t.type === '1c' ? 'rgba(91,127,255,.2)' : 'rgba(61,214,140,.2)'};
      color:${t.type === '1c' ? 'var(--accent2)' : 'var(--success)'}">
      ${t.type === '1c' ? '1К' : '2К'}</div>
    <div class="mat-info"><div class="mat-name">${esc(t.name)}</div>
      <div class="mat-sub">${esc(t.color)} · ${t.layers} сл. · ${t.consumption} г/м²</div></div>
    <div class="mat-price">${t.price.toLocaleString('ru')} ₸/кг</div>
  </div>`).join('')}
  <div class="btn-row" style="margin-top:16px">
    <button class="btn btn-secondary" id="btn-back2b">← Назад</button>
    <button class="btn btn-primary" id="btn-next2" ${!c.templateId ? 'disabled' : ''}>Далее →</button>
  </div>`;
}

function renderStep3() {
  const c = state.current;
  const tpl = state.templates.find(t => t.id === c.templateId);
  const p = c.params;
  const is2c = tpl && tpl.type === '2c';
  return `${stepper(2)}
  <div class="nav"><button class="nav-back" id="btn-back3">← Назад</button>
    <div class="nav-title">Параметры материала</div></div>
  <div class="card">
    <div class="section-title">Основные параметры</div>
    <div class="field"><label>Название</label><input id="p-name" value="${esc(p.name || tpl.name)}"></div>
    <div class="field-row">
      <div class="field"><label>Цвет</label><input id="p-color" value="${esc(p.color || tpl.color)}"></div>
      <div class="field"><label>Цена (₸/кг)</label><input id="p-price" type="number" inputmode="decimal" value="${p.price || tpl.price}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Расход (г/м²)</label><input id="p-cons" type="number" inputmode="decimal" value="${p.consumption || tpl.consumption}"></div>
      <div class="field"><label>Кол-во слоёв</label><input id="p-layers" type="number" inputmode="numeric" min="2" value="${p.layers || tpl.layers}"></div>
    </div>
    <div class="field"><label>Расход грунт. слоя (г/м²)</label>
      <input id="p-primer" type="number" inputmode="decimal" value="${p.primer_consumption || tpl.primer_consumption}"></div>
  </div>
  ${is2c ? `<div class="card">
    <div class="section-title">Двухкомпонентная система</div>
    <div class="field-row">
      <div class="field"><label>Основа (кг/компл)</label><input id="p-base" type="number" inputmode="decimal" value="${p.base || tpl.base}"></div>
      <div class="field"><label>Отвердитель (кг/компл)</label><input id="p-hard" type="number" inputmode="decimal" value="${p.hardener || tpl.hardener}"></div>

  const html = `<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8">

/* ===== COLLECT HELPERS ===== */
function v(id) { const el = document.getElementById(id); return el ? el.value : null; }
function n(id) { const el = document.getElementById(id); return el ? parseFloat(el.value) || 0 : null; }
function collectParams() {
  return { name: v('p-name'), color: v('p-color'), price: n('p-price'), consumption: n('p-cons'),
    layers: n('p-layers'), primer_consumption: n('p-primer'), container_type: v('p-ctype'),
    container_weight: n('p-cwt'), base: n('p-base'), hardener: n('p-hard'),
    thinner: v('p-thinner'), thinnerPct: n('p-tpct'), comment: v('p-comment'), notes: v('p-notes') };
}
function collectTemplate() {
  const typeEl = document.querySelector('#etype-2c.selected');
  const type = typeEl ? '2c' : '1c';
  return { name: v('e-name'), type, color: v('e-color'), price: n('e-price'), consumption: n('e-cons'),
    layers: n('e-layers'), primer_consumption: n('e-primer'), container_type: v('e-ctype'),
    container_weight: n('e-cwt'), base: n('e-base'), hardener: n('e-hard'),
    thinner: v('e-thinner'), thinnerPct: n('e-tpct'), comment: v('e-comment'), notes: v('e-notes') };
}

/* ===== RENDER + BIND ===== */
function render() {
  const root = document.getElementById('root');
  const s = state.screen;
  if (s === 'home') root.innerHTML = renderHome();
  else if (s === 'new1') root.innerHTML = renderStep1();
  else if (s === 'new2') root.innerHTML = renderStep2();
  else if (s === 'new3') root.innerHTML = renderStep3();
  else if (s === 'result') root.innerHTML = renderResult();
  else if (s === 'templates') root.innerHTML = renderTemplates();
  else if (s === 'editTemplate') root.innerHTML = renderEditTemplate();
  else if (s === 'proposals') root.innerHTML = renderProposals();
  else if (s === 'viewProposal') root.innerHTML = renderViewProposal();
  bindEvents();
}

function on(id, fn) { const el = document.getElementById(id); if (el) el.addEventListener('click', fn); }

function bindEvents() {
  // HOME
  on('btn-new', () => nav('new1'));
  on('btn-proposals', () => nav('proposals'));
  on('btn-templates', () => nav('templates'));
  document.querySelectorAll('[data-pid]').forEach(el => {
    el.addEventListener('click', () => {
      const pr = state.proposals.find(p => p.id === el.dataset.pid);
      if (pr) nav('viewProposal', { viewProposal: pr });
    });
  });

  // STEP 1
  on('type-1c', () => { state.current.type = '1c'; state.current.templateId = ''; render(); });
  on('type-2c', () => { state.current.type = '2c'; state.current.templateId = ''; render(); });
  on('btn-next1', () => {
    const area = document.getElementById('inp-area')?.value || '';
    if (!area || parseFloat(area) <= 0) { show('⚠️ Введите площадь'); return; }
    state.current.name = document.getElementById('inp-name')?.value.trim() || '';
    state.current.area = area;
    nav('new2');
  });

  // STEP 2
  on('btn-back2', () => nav('new1'));
  on('btn-back2b', () => nav('new1'));
  on('btn-next2', () => nav('new3'));
  document.querySelectorAll('[data-tid]').forEach(el => {
    el.addEventListener('click', () => {
      state.current.templateId = el.dataset.tid;
      state.current.params = {};
      render();
    });
  });

  // STEP 3
  on('btn-back3', () => nav('new2'));
  on('btn-back3b', () => nav('new2'));
  on('btn-calc', () => {
    state.current.params = collectParams();
    const saveChk = document.getElementById('p-save');
    if (saveChk?.checked) {
      const newTpl = { ...state.current.params, id: genId(), type: state.current.type };
      state.templates.push(newTpl); persist(); show('✅ Шаблон сохранён!');
    }
    nav('result');
  });

  // RESULT
  on('btn-back4', () => nav('new3'));
  on('btn-new-after', () => { state.current = { name: '', area: '', type: '1c', templateId: '', params: {} }; nav('new1'); });
  on('btn-save-kp', () => {
    const c = state.current;
    const tpl = state.templates.find(t => t.id === c.templateId);
    const mergedTpl = { ...tpl, ...c.params };
    const res = calcProposal(c.area, mergedTpl);
    const pr = { id: genId(), name: c.name || 'Без названия', area: parseFloat(c.area),
      matName: mergedTpl.name, total: res.costMat, date: Date.now(), result: res };
    state.proposals.push(pr); persist();
    show('✅ КП сохранено!');
  });
  on('btn-export', () => {
    const c = state.current;
    const tpl = state.templates.find(t => t.id === c.templateId);
    const mergedTpl = { ...tpl, ...c.params };
    const res = calcProposal(c.area, mergedTpl);
    exportPDF({ name: c.name || 'Без названия', date: Date.now(), matName: mergedTpl.name, total: res.costMat, result: res, id: genId() });
  });

  // TEMPLATES
  on('btn-back-home', () => nav('home'));
  on('btn-add-tpl', () => { state.editTemplate = null; nav('editTemplate'); });
  document.querySelectorAll('[data-edit]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const tpl = state.templates.find(t => t.id === el.dataset.edit);
      if (tpl) { state.editTemplate = JSON.parse(JSON.stringify(tpl)); nav('editTemplate'); }
    });
  });
  document.querySelectorAll('[data-edit-open]').forEach(el => {
    el.addEventListener('click', () => {
      const tpl = state.templates.find(t => t.id === el.dataset.editOpen);
      if (tpl) { state.editTemplate = JSON.parse(JSON.stringify(tpl)); nav('editTemplate'); }
    });
  });
  document.querySelectorAll('[data-del]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (confirm('Удалить шаблон?')) {
        state.templates = state.templates.filter(t => t.id !== el.dataset.del);
        persist(); show('🗑 Шаблон удалён'); render();
      }
    });
  });

  // EDIT TEMPLATE
  on('btn-back-tpls', () => nav('templates'));
  on('etype-1c', () => { if (!state.editTemplate) state.editTemplate = {}; state.editTemplate.type = '1c'; render(); });
  on('etype-2c', () => { if (!state.editTemplate) state.editTemplate = {}; state.editTemplate.type = '2c'; render(); });
  on('btn-save-tpl', () => {
    const t = collectTemplate();
    if (!t.name) { show('⚠️ Введите название'); return; }
    if (state.editTemplate && state.editTemplate.id !== 'new') {
      const idx = state.templates.findIndex(x => x.id === state.editTemplate.id);
      if (idx >= 0) state.templates[idx] = { ...state.editTemplate, ...t };
    } else {
      state.templates.push({ ...t, id: genId() });
    }
    persist(); show('✅ Шаблон сохранён!'); nav('templates');
  });
  on('btn-del-tpl', () => {
    if (confirm('Удалить шаблон?')) {
      state.templates = state.templates.filter(t => t.id !== state.editTemplate.id);
      persist(); show('🗑 Удалён'); nav('templates');
    }
  });

  // PROPOSALS
  on('btn-back-home', () => nav('home'));
  document.querySelectorAll('[data-pdel]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (confirm('Удалить КП?')) {
        state.proposals = state.proposals.filter(p => p.id !== el.dataset.pdel);
        persist(); show('🗑 КП удалено'); render();
      }
    });
  });

  // VIEW PROPOSAL
  on('btn-back-props', () => nav('proposals'));
  on('btn-export-saved', () => { if (state.viewProposal) exportPDF(state.viewProposal); });
  on('btn-del-this', () => {
    if (confirm('Удалить это КП?')) {
      state.proposals = state.proposals.filter(p => p.id !== state.viewProposal.id);
      persist(); show('🗑 КП удалено'); nav('proposals');
    }
  });
}

render();
</script>
</body>
</html>
